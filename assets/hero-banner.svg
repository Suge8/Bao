<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d0a"/>
      <stop offset="100%" stop-color="#0d0b0a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb36a" stop-opacity="0"/>
      <stop offset="48%" stop-color="#ffb36a" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#ff7a45" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#ffb36a" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#ffb36a" stop-opacity="0"/>
    </radialGradient>
    <style>
      .display{font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif}
      .title{font-size:52px;font-weight:700;fill:#fff4e7}
      .sub{font-size:16px;font-weight:600;fill:#dfc5af}
      .pill{font-size:12px;font-weight:700;fill:#ffe4c7}
      @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
      .pulse{animation:pulse 4.1s ease-in-out infinite}
    </style>
  </defs>

  <rect width="800" height="200" rx="18" fill="url(#bg)"/>
  <circle cx="124" cy="44" r="124" fill="url(#glow)"/>
  <circle cx="706" cy="154" r="164" fill="url(#glow)"/>
  <path d="M28 30 H772" stroke="url(#line)" stroke-width="1.2"/>
  <path d="M28 170 H772" stroke="url(#line)" stroke-width="1.2"/>

  <g transform="translate(50 62)">
    <text class="display title">Bao</text>
    <text y="36" class="display sub">超强记忆 · 长任务引擎 · 子代理并行 · 编码代理 · MCP 生态</text>
  </g>

  <g transform="translate(50 128)">
    <rect width="112" height="28" rx="14" fill="#2b1b14" stroke="#5a3829"/>
    <text x="56" y="19" text-anchor="middle" class="display pill">持久记忆</text>
    <rect x="122" width="122" height="28" rx="14" fill="#2b1b14" stroke="#5a3829"/>
    <text x="183" y="19" text-anchor="middle" class="display pill">长任务稳定</text>
    <rect x="254" width="118" height="28" rx="14" fill="#2b1b14" stroke="#5a3829"/>
    <text x="313" y="19" text-anchor="middle" class="display pill">后台并行</text>
    <rect x="382" width="110" height="28" rx="14" fill="#2b1b14" stroke="#5a3829"/>
    <text x="437" y="19" text-anchor="middle" class="display pill">自动化</text>
  </g>

  <g transform="translate(588 42)" class="pulse">
    <rect width="152" height="116" rx="22" fill="#18120f" stroke="#3b281e"/>
    <rect x="14" y="14" width="124" height="88" rx="16" fill="#221711" stroke="#563628"/>
    <rect x="26" y="28" width="34" height="58" rx="11" fill="#19130f" stroke="#3a2a21"/>
    <circle cx="38" cy="46" r="5" fill="#ffb36a"/>
    <circle cx="38" cy="64" r="5" fill="#7d5b45"/>
    <rect x="72" y="34" width="48" height="16" rx="8" fill="#2b1b14" stroke="#5a3829"/>
    <rect x="72" y="58" width="48" height="16" rx="8" fill="#2b1b14" stroke="#4b3124"/>
  </g>
</svg>
