<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0a08"/>
      <stop offset="50%" stop-color="#1a120d"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241914"/>
      <stop offset="100%" stop-color="#16110d"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffdb9f"/>
      <stop offset="100%" stop-color="#ff8e5a"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8f2d4"/>
      <stop offset="100%" stop-color="#50b591"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb8a3"/>
      <stop offset="100%" stop-color="#ff7163"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cae9ff"/>
      <stop offset="100%" stop-color="#78abfc"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2cdff"/>
      <stop offset="100%" stop-color="#af7fff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffb36a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffb36a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4db28f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4db28f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>
      .display{font-family:"SF Pro Display","Avenir Next","PingFang SC","Noto Sans SC",sans-serif}
      .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.8px;fill:#f0b87f}
      .headline{font-size:28px;font-weight:700;fill:#fff5e8;line-height:1.3}
      .title{font-size:18px;font-weight:700;fill:#fff2e1}
      .body{font-size:12.5px;font-weight:600;fill:#d5b9a2;line-height:1.5}
      .tag{font-size:10px;font-weight:700}
      @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
      @keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
      .pulse{animation:pulse 4s ease-in-out infinite}
      .float{animation:float 3s ease-in-out infinite}
      .glow{animation:glow 3s ease-in-out infinite}
    </style>
  </defs>

  <rect width="800" height="480" rx="20" fill="url(#bg)"/>
  <circle cx="150" cy="100" r="200" fill="url(#glow1)"/>
  <circle cx="650" cy="350" r="180" fill="url(#glow2)"/>

  <g transform="translate(18 18)" filter="url(#shadow)">
    <rect width="500" height="160" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <text x="28" y="36" class="display eyebrow">核心优势</text>
    <text x="28" y="76" class="display headline">真正能长期使用的 AI 助手</text>
    <text x="28" y="104" class="display body">持久记忆、经验学习、长任务引擎、子代理并行</text>
    <text x="28" y="128" class="display body">不只是聊天，而是一套完整的智能协作系统</text>
  </g>

  <g transform="translate(534 18)" filter="url(#shadow)" class="float">
    <rect width="248" height="138" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="138" rx="2" fill="url(#warm)" class="glow"/>
    <text x="22" y="34" class="display title">持久记忆系统</text>
    <text x="22" y="58" class="display body">LanceDB 向量检索，跨会话保留</text>
    <text x="22" y="78" class="display body">偏好、项目知识自动分类管理</text>
    <rect x="22" y="100" width="68" height="22" rx="11" fill="#ffb36a" fill-opacity="0.15" stroke="#ffb36a" stroke-opacity="0.4"/>
    <text x="56" y="115" text-anchor="middle" class="display tag" fill="#ffd9b1">持久化</text>
    <rect x="98" y="100" width="78" height="22" rx="11" fill="#ffb36a" fill-opacity="0.15" stroke="#ffb36a" stroke-opacity="0.4"/>
    <text x="137" y="115" text-anchor="middle" class="display tag" fill="#ffd9b1">智能召回</text>
  </g>

  <g transform="translate(18 196)" filter="url(#shadow)">
    <rect width="244" height="118" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="118" rx="2" fill="url(#mint)" class="glow"/>
    <text x="20" y="34" class="display title">经验学习引擎</text>
    <text x="20" y="58" class="display body">自动提取教训和策略</text>
    <text x="20" y="78" class="display body">相似任务自动注入经验</text>
    <text x="20" y="98" class="display body">质量评分 + 置信度校准</text>
  </g>

  <g transform="translate(278 196)" filter="url(#shadow)">
    <rect width="240" height="118" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="118" rx="2" fill="url(#rose)" class="glow"/>
    <text x="20" y="34" class="display title">长任务引擎</text>
    <text x="20" y="58" class="display body">轨迹压缩 + 充分性检查</text>
    <text x="20" y="78" class="display body">上下文自动压实</text>
    <text x="20" y="98" class="display body">复杂任务稳定执行</text>
  </g>

  <g transform="translate(534 174)" filter="url(#shadow)" class="float" style="animation-delay: 0.5s">
    <rect width="248" height="140" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="140" rx="2" fill="url(#sky)" class="glow"/>
    <text x="22" y="34" class="display title">子代理并行</text>
    <text x="22" y="58" class="display body">后台执行，主对话不阻塞</text>
    <text x="22" y="78" class="display body">进度透明，支持取消续接</text>
    <text x="22" y="98" class="display body">里程碑自动推送</text>
  </g>

  <g transform="translate(18 332)" filter="url(#shadow)">
    <rect width="244" height="128" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="128" rx="2" fill="url(#violet)" class="glow"/>
    <text x="20" y="34" class="display title">编码代理集成</text>
    <text x="20" y="58" class="display body">Codex / Claude Code</text>
    <text x="20" y="78" class="display body">OpenCode 原生接入</text>
    <text x="20" y="98" class="display body">主代理和子代理都能调用</text>
  </g>

  <g transform="translate(278 332)" filter="url(#shadow)">
    <rect width="240" height="128" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="128" rx="2" fill="url(#warm)" class="glow"/>
    <text x="20" y="34" class="display title">MCP 工具生态</text>
    <text x="20" y="58" class="display body">兼容 Claude Desktop</text>
    <text x="20" y="78" class="display body">智能工具路由</text>
    <text x="20" y="98" class="display body">Schema 自动优化</text>
  </g>

  <g transform="translate(534 332)" filter="url(#shadow)">
    <rect width="248" height="128" rx="22" fill="url(#card)" stroke="#4a3228" stroke-width="1.5"/>
    <rect x="0" y="0" width="4" height="128" rx="2" fill="url(#sky)" class="glow"/>
    <text x="22" y="34" class="display title">9 大平台 + 桌面自动化</text>
    <text x="22" y="58" class="display body">一套能力，多处交付</text>
    <text x="22" y="78" class="display body">截图、点击、输入、滚动</text>
    <text x="22" y="98" class="display body">桌面端和 CLI 共用 Core</text>
  </g>

  <g transform="translate(726 46)" class="pulse">
    <circle r="9" fill="#ffb36a" filter="url(#shadow)"/>
    <circle r="5" fill="#fff"/>
  </g>
</svg>
