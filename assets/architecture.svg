<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d0a"/>
      <stop offset="100%" stop-color="#0d0b0a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d1511"/>
      <stop offset="100%" stop-color="#15100d"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd39a"/>
      <stop offset="100%" stop-color="#ff8b58"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b6f0d2"/>
      <stop offset="100%" stop-color="#4db28f"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8e7ff"/>
      <stop offset="100%" stop-color="#76a9fa"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0cbff"/>
      <stop offset="100%" stop-color="#ad7dff"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb6a1"/>
      <stop offset="100%" stop-color="#ff6f61"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 Z" fill="#ffb36a" fill-opacity=".7"/>
    </marker>
    <style>
      .display{font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif}
      .eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;fill:#efb67d}
      .title{font-size:18px;font-weight:700;fill:#fff1df}
      .body{font-size:12px;font-weight:600;fill:#d2b49d}
      .tag{font-size:10px;font-weight:700;fill:#ffe4c7}
      .wire{fill:none;stroke:#ffb36a;stroke-width:1.6;stroke-opacity:.45;stroke-dasharray:6 7;marker-end:url(#arrow)}
      @keyframes pulse{0%,100%{opacity:.48}50%{opacity:1}}
      .pulse{animation:pulse 4.2s ease-in-out infinite}
    </style>
  </defs>

  <rect width="800" height="520" rx="22" fill="url(#bg)"/>

  <text x="32" y="40" class="display eyebrow">HOW THE ADVANTAGES FIT TOGETHER</text>
  <text x="32" y="68" class="display title" font-size="24">不是散点功能，而是一套协同工作的能力结构</text>

  <g transform="translate(28 106)">
    <rect width="156" height="72" rx="18" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="url(#warm)"/>
    <text x="18" y="30" class="display title">用户请求</text>
    <text x="18" y="50" class="display body">聊天、任务、文件、自动化</text>
  </g>

  <g transform="translate(28 206)">
    <rect width="156" height="72" rx="18" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="url(#sky)"/>
    <text x="18" y="30" class="display title">多平台输入</text>
    <text x="18" y="50" class="display body">桌面端 + 9 大聊天平台</text>
  </g>

  <g transform="translate(28 306)">
    <rect width="156" height="72" rx="18" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="url(#violet)"/>
    <text x="18" y="30" class="display title">工具和环境</text>
    <text x="18" y="50" class="display body">文件、Shell、桌面、浏览器、MCP</text>
  </g>

  <g transform="translate(220 88)">
    <rect width="320" height="330" rx="28" fill="#17120f" stroke="#57392a"/>
    <rect x="20" y="20" width="280" height="290" rx="22" fill="url(#card)" stroke="#6a4633"/>
    <text x="40" y="48" class="display eyebrow">BAO CORE</text>
    <text x="40" y="78" class="display title" font-size="24">AgentLoop / Gateway</text>

    <rect x="40" y="102" width="112" height="58" rx="16" fill="#201610" stroke="#4f3425"/>
    <text x="58" y="126" class="display title">长期记忆</text>
    <text x="58" y="146" class="display body">LanceDB 持久化</text>

    <rect x="168" y="102" width="112" height="58" rx="16" fill="#201610" stroke="#4f3425"/>
    <text x="186" y="126" class="display title">经验引擎</text>
    <text x="186" y="146" class="display body">闭环学习</text>

    <rect x="40" y="176" width="112" height="58" rx="16" fill="#201610" stroke="#4f3425"/>
    <text x="58" y="200" class="display title">长任务引擎</text>
    <text x="58" y="220" class="display body">压实 + 校验 + 收口</text>

    <rect x="168" y="176" width="112" height="58" rx="16" fill="#201610" stroke="#4f3425"/>
    <text x="186" y="200" class="display title">子代理</text>
    <text x="186" y="220" class="display body">后台并行</text>

    <rect x="40" y="250" width="240" height="40" rx="14" fill="#221711" stroke="#5d3a29"/>
    <text x="58" y="275" class="display title">自动规划 / 诊断 / 上下文治理</text>
  </g>

  <g transform="translate(576 88)">
    <rect width="196" height="100" rx="22" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="url(#mint)"/>
    <text x="20" y="32" class="display title">编码代理</text>
    <text x="20" y="54" class="display body">Codex / Claude Code / OpenCode</text>
    <text x="20" y="76" class="display body">主代理与子代理都能调用</text>
  </g>

  <g transform="translate(576 212)">
    <rect width="196" height="100" rx="22" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="url(#rose)"/>
    <text x="20" y="32" class="display title">MCP 工具生态</text>
    <text x="20" y="54" class="display body">stdio / HTTP</text>
    <text x="20" y="76" class="display body">Schema 与预算控制内建</text>
  </g>

  <g transform="translate(576 336)">
    <rect width="196" height="100" rx="22" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="100" rx="2" fill="url(#sky)"/>
    <text x="20" y="32" class="display title">桌面自动化</text>
    <text x="20" y="54" class="display body">截图、点击、输入、滚动、拖拽</text>
    <text x="20" y="76" class="display body">模型无关，和 core 同链路</text>
  </g>

  <g transform="translate(220 446)">
    <rect width="552" height="48" rx="18" fill="url(#card)" stroke="#463127"/>
    <rect x="0" y="0" width="4" height="48" rx="2" fill="url(#violet)"/>
    <text x="18" y="30" class="display body">所以 Bao 的优势不是单个亮点，而是这些能力彼此配合，形成真正可长期使用的个人 AI 助手。</text>
  </g>

  <path d="M184 142 H220" class="wire"/>
  <path d="M184 242 H220" class="wire"/>
  <path d="M184 342 H220" class="wire"/>
  <path d="M540 140 H576" class="wire"/>
  <path d="M540 264 H576" class="wire"/>
  <path d="M540 388 H576" class="wire"/>

  <g transform="translate(680 52)" class="pulse">
    <rect width="78" height="24" rx="12" fill="#2d1b14" stroke="#5c3929"/>
    <text x="39" y="16" text-anchor="middle" class="display tag">real stack</text>
  </g>
</svg>
