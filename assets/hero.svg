<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120d0a"/>
      <stop offset="48%" stop-color="#1a120d"/>
      <stop offset="100%" stop-color="#0b0a09"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#241914"/>
      <stop offset="100%" stop-color="#17110d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb36a" stop-opacity="0"/>
      <stop offset="48%" stop-color="#ffb36a" stop-opacity=".82"/>
      <stop offset="100%" stop-color="#ff7a45" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#ffb36a" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#ffb36a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#ff7a45" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ff7a45" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <style>
      .display{font-family:"Avenir Next","PingFang SC","Noto Sans SC",sans-serif}
      .mono{font-family:"SFMono-Regular","Menlo",monospace}
      .eyebrow{font-size:12px;font-weight:700;letter-spacing:2.2px;fill:#efb67d}
      .title{font-size:78px;font-weight:700;fill:#fff4e7}
      .sub{font-size:20px;font-weight:600;fill:#e8d2bc}
      .muted{font-size:14px;font-weight:600;fill:#b9a08d}
      .pill{font-size:13px;font-weight:700;fill:#ffe7cf}
      .cardTitle{font-size:15px;font-weight:700;fill:#fff0df}
      .cardBody{font-size:12px;font-weight:600;fill:#cfb19a}
      .wire{fill:none;stroke:#ffb36a;stroke-opacity:.35;stroke-width:1.4;stroke-dasharray:6 8}
      @keyframes floatA{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
      @keyframes floatB{0%,100%{transform:translateY(0px)}50%{transform:translateY(9px)}}
      @keyframes pulse{0%,100%{opacity:.58}50%{opacity:1}}
      @keyframes drift{0%,100%{transform:translateX(0px)}50%{transform:translateX(10px)}}
      .floatA{animation:floatA 7s ease-in-out infinite}
      .floatB{animation:floatB 8s ease-in-out infinite}
      .pulse{animation:pulse 4.2s ease-in-out infinite}
      .drift{animation:drift 8.6s ease-in-out infinite}
    </style>
  </defs>

  <rect width="800" height="420" rx="24" fill="url(#bg)"/>
  <circle cx="124" cy="86" r="176" fill="url(#glowA)"/>
  <circle cx="650" cy="88" r="184" fill="url(#glowB)"/>
  <circle cx="622" cy="332" r="218" fill="url(#glowA)"/>
  <path d="M42 50 H758" stroke="url(#line)" stroke-width="1.2"/>
  <path d="M52 374 H748" stroke="url(#line)" stroke-width="1.2"/>

  <g transform="translate(54 68)">
    <text class="display eyebrow">PERSONAL AI THAT HOLDS UP</text>
    <text y="92" class="display title">Bao</text>
    <text y="132" class="display sub">记得住，能并行，会进化</text>
    <text y="162" class="display sub">长期记忆、长任务引擎、子代理、编码代理、MCP 与桌面自动化都已打通。</text>

    <g transform="translate(0 214)">
      <rect width="110" height="34" rx="17" fill="#2b1b14" stroke="#5a3829"/>
      <text x="55" y="22" text-anchor="middle" class="display pill">超强记忆</text>
      <rect x="120" width="122" height="34" rx="17" fill="#2b1b14" stroke="#5a3829"/>
      <text x="181" y="22" text-anchor="middle" class="display pill">长任务引擎</text>
      <rect x="252" width="118" height="34" rx="17" fill="#2b1b14" stroke="#5a3829"/>
      <text x="311" y="22" text-anchor="middle" class="display pill">子代理并行</text>
      <rect x="380" width="118" height="34" rx="17" fill="#2b1b14" stroke="#5a3829"/>
      <text x="439" y="22" text-anchor="middle" class="display pill">编码代理</text>
    </g>

    <text y="288" class="display muted">用户看到的是简单入口，底层跑的是完整的 Agent Core。</text>
  </g>

  <g transform="translate(468 56)" filter="url(#shadow)">
    <g class="floatA">
      <rect width="280" height="298" rx="26" fill="#17120f" stroke="#3d2a20"/>
      <rect x="18" y="18" width="244" height="262" rx="20" fill="url(#panel)" stroke="#4e3427"/>
      <rect x="34" y="34" width="60" height="230" rx="14" fill="#18120f" stroke="#3a2a21"/>
      <circle cx="50" cy="58" r="7" fill="#ffb36a"/>
      <circle cx="50" cy="86" r="7" fill="#d08d5d"/>
      <circle cx="50" cy="114" r="7" fill="#705547"/>

      <rect x="112" y="40" width="112" height="28" rx="14" fill="#211611" stroke="#603d2b"/>
      <text x="168" y="58" text-anchor="middle" class="display cardTitle">Bao Core</text>

      <rect x="112" y="92" width="120" height="50" rx="16" fill="#231712" stroke="#593928"/>
      <text x="128" y="112" class="display cardTitle">长期记忆</text>
      <text x="128" y="130" class="display cardBody">跨会话、跨重启</text>

      <rect x="112" y="156" width="120" height="50" rx="16" fill="#201610" stroke="#503324"/>
      <text x="128" y="176" class="display cardTitle">长任务引擎</text>
      <text x="128" y="194" class="display cardBody">压实、校验、收口</text>

      <rect x="112" y="220" width="120" height="44" rx="16" fill="#201610" stroke="#4c3124"/>
      <text x="128" y="240" class="display cardTitle">编码代理 + MCP</text>
      <text x="128" y="256" class="display cardBody">已接入真实实现</text>
    </g>

    <g transform="translate(-28 54)" class="pulse">
      <rect width="104" height="58" rx="16" fill="#1f1510" stroke="#5f3c2a"/>
      <text x="16" y="23" class="display cardTitle">子代理</text>
      <text x="16" y="41" class="display cardBody">后台跑活，进度可查</text>
      <circle cx="80" cy="28" r="9" fill="#ffb36a" fill-opacity=".85"/>
    </g>

    <g transform="translate(210 -12)" class="drift">
      <rect width="122" height="62" rx="18" fill="#201611" stroke="#6a412c"/>
      <text x="18" y="25" class="display cardTitle">桌面自动化</text>
      <text x="18" y="44" class="display cardBody">看屏幕、点击、输入</text>
    </g>

    <g transform="translate(214 238)" class="floatB">
      <rect width="132" height="64" rx="18" fill="#211611" stroke="#73462f"/>
      <text x="18" y="27" class="display cardTitle">9 大平台</text>
      <text x="18" y="46" class="display cardBody">一套能力，多处交付</text>
    </g>

    <path d="M76 84 C104 84 118 92 134 110" class="wire"/>
    <path d="M236 38 C220 56 214 68 206 92" class="wire"/>
    <path d="M256 268 C230 248 214 240 194 230" class="wire"/>
  </g>

  <g transform="translate(616 348)">
    <rect width="102" height="28" rx="14" fill="#2d1b14" stroke="#5c3929"/>
    <text x="51" y="19" text-anchor="middle" class="mono" font-size="12" fill="#ffddba">long-run-ready</text>
  </g>
</svg>
